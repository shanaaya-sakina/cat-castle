<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Cat Castle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="name-screen">
    <h1>Cat Castle</h1>
    <input type="text" id="player-name" placeholder="Enter your name" maxlength="12">
    <button type="button" id="btn-start">Start Game</button>
    <div id="instructions">
      <h2>How to Play</h2>
      <p><strong>Move:</strong> Arrow keys or WASD</p>
      <p><strong>Melee ⚔️:</strong> Space</p>
      <p><strong>Ranged 🏹:</strong> F</p>
      <p><strong>Boosters:</strong></p>
      <p>🔥 Damage — attacks hit harder for 5s</p>
      <p>🛡️ Shield — you take no damage for 5s</p>
      <p>🧪 Heal — restores some health</p>
    </div>

    <div id="name-leaderboard">
      <h2>Leaderboard</h2>
      <ol id="name-leaderboard-list"></ol>
    </div>
  </div>

  <canvas id="game" width="800" height="600" class="hidden"></canvas>
  <button type="button" id="btn-again" class="hidden">Play Again</button>

  <div id="controls" class="hidden">
    <div id="actions">
      <button type="button" class="ctrl-btn action-btn" id="btn-melee">⚔️</button>
      <button type="button" class="ctrl-btn action-btn" id="btn-ranged">🏹</button>
    </div>
    <div id="dpad">
      <button type="button" class="ctrl-btn dpad-btn" id="btn-up">▲</button>
      <button type="button" class="ctrl-btn dpad-btn" id="btn-left">◀</button>
      <div id="dpad-center"></div>
      <button type="button" class="ctrl-btn dpad-btn" id="btn-right">▶</button>
      <button type="button" class="ctrl-btn dpad-btn" id="btn-down">▼</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
