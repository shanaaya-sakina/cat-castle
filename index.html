<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Fantasy Adventure</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="name-screen">
    <h1>Fantasy Adventure</h1>
    <input type="text" id="player-name" placeholder="Enter your name" maxlength="12">
    <button type="button" id="btn-start">Start Game</button>
    <div id="name-leaderboard">
      <h2>Leaderboard</h2>
      <ol id="name-leaderboard-list"></ol>
    </div>
  </div>

  <canvas id="game" width="800" height="600" class="hidden"></canvas>

  <div id="controls" class="hidden">
    <div id="actions">
      <button type="button" class="ctrl-btn action-btn" id="btn-melee">⚔️</button>
      <button type="button" class="ctrl-btn action-btn" id="btn-ranged">🏹</button>
    </div>
    <div id="dpad">
      <button type="button" class="ctrl-btn dpad-btn" id="btn-up">▲</button>
      <button type="button" class="ctrl-btn dpad-btn" id="btn-left">◀</button>
      <div id="dpad-center"></div>
      <button type="button" class="ctrl-btn dpad-btn" id="btn-right">▶</button>
      <button type="button" class="ctrl-btn dpad-btn" id="btn-down">▼</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
